<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edukasi Duta Terang</title>
    <style>
        :root { --primary: #00bcd4; --bg: #f4f7f6; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 50px; }
        
        /* Navigasi */
        .nav { background: #fff; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav a { text-decoration: none; color: var(--primary); font-weight: bold; }

        .container { max-width: 1100px; margin: auto; padding: 20px; }
        h2 { border-left: 5px solid var(--primary); padding-left: 10px; margin-top: 40px; }

        /* Grid System 3 Kolom */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        /* Video Card */
        .v-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .v-wrap { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .v-wrap iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }
        .v-info { padding: 12px; font-size: 14px; font-weight: bold; }

        /* Artikel Card */
        .a-card { background: #fff; padding: 20px; border-radius: 10px; border-top: 4px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .a-card h3 { margin-top: 0; font-size: 16px; }
        .a-card p { font-size: 13px; color: #666; line-height: 1.5; }

        @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html">⬅️ Kembali ke Beranda</a>
</div>

<div class="container">
    <h2>📽️ Video Tutorial</h2>
    <div id="video-grid" class="grid"><p>Memuat video...</p></div>

    <h2>📖 Artikel Terbaru</h2>
    <div id="article-grid" class="grid"><p>Memuat artikel...</p></div>
</div>

<script>
    const SCRIPT_URL = "URL_DEPLOYMENT_ANDA_DI_SINI";

    async function loadData() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            let vHtml = "", aHtml = "";

            data.forEach(item => {
                if(item.tipe === 'video') {
                    vHtml += `
                        <div class="v-card">
                            <div class="v-wrap"><iframe src="${item.link_media}" allowfullscreen></iframe></div>
                            <div class="v-info">${item.judul}</div>
                        </div>`;
                } else {
                    aHtml += `
                        <div class="a-card">
                            <h3>${item.judul}</h3>
                            <p>${item.isi}</p>
                            <small style="color:#999">${item.tanggal}</small>
                        </div>`;
                }
            });

            document.getElementById('video-grid').innerHTML = vHtml || "<p>Belum ada video.</p>";
            document.getElementById('article-grid').innerHTML = aHtml || "<p>Belum ada artikel.</p>";

        } catch (e) {
            document.getElementById('video-grid').innerHTML = "Gagal memuat data.";
        }
    }

    loadData();
</script>

</body>
</html>
