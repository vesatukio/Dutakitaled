<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edukasi Duta Terang</title>
    <style>
        :root { --primary: #00bcd4; --bg: #f5f6f8; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; }

        /* Navbar */
        .nav { background: var(--primary); padding: 15px; color: white; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav a { text-decoration: none; color: white; font-size: 18px; font-weight: bold; margin-right: 15px; }

        .container { padding: 10px; max-width: 800px; margin: auto; }
        h2 { font-size: 14px; margin: 25px 5px 10px; border-left: 4px solid var(--primary); padding-left: 10px; text-transform: uppercase; color: #555; }

        /* Grid System: Menjaga Kerapian & Judul Full */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            align-items: stretch; /* MEMASTIKAN SEMUA CARD SAMA TINGGI */
        }

        /* Card Style */
        .card { 
            background: #fff; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
            height: 100%; 
            border: 1px solid #eee;
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.96); }

        /* Thumbnail */
        .thumb { 
            width: 100%; 
            height: 75px; 
            background: #222; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            flex-shrink: 0; 
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .play-icon { position: absolute; color: white; font-size: 22px; opacity: 0.9; text-shadow: 0 0 10px rgba(0,0,0,0.5); }

        /* Card Body: Area Judul */
        .card-body { 
            padding: 8px 5px; 
            flex-grow: 1; 
            display: flex; 
            align-items: center; /* Judul rata tengah secara vertikal */
            justify-content: center;
            background: #fff;
        }

        /* Judul Full (Anti Terpotong) */
        .card-title { 
            font-size: 10.5px; 
            font-weight: bold; 
            line-height: 1.3; 
            color: #222; 
            text-align: center; 
            display: block; 
            overflow: visible; 
            white-space: normal; 
            word-wrap: break-word; /* Memastikan kata panjang tidak keluar kotak */
        }

        /* Modal Full Content */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; max-height: 85vh; border-radius: 15px; overflow-y: auto; padding: 20px; position: relative; box-sizing: border-box; }
        .close-modal { position: sticky; top: 0; float: right; background: #f0f0f0; border: none; padding: 10px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        
        .modal-body { 
            line-height: 1.7; 
            font-size: 15px; 
            margin-top: 15px; 
            white-space: pre-wrap; /* Menjaga format Enter/Paragraf dari Sheets */
            color: #444; 
        }

        .loading { text-align: center; padding: 50px; color: #888; font-weight: bold; }
        .hide { display: none; }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html">⬅</a>
    <span style="font-weight: bold;">PUSAT EDUKASI DUTA TERANG</span>
</nav>

<div class="container">
    <div id="loader" class="loading">Menghubungkan ke Database Sparepart...</div>

    <section id="sec-video" class="hide">
        <h2>📽️ VIDEO TUTORIAL</h2>
        <div id="grid-video" class="grid"></div>
    </section>

    <section id="sec-artikel" class="hide">
        <h2>📖 ARTIKEL TEKNIK</h2>
        <div id="grid-artikel" class="grid"></div>
    </section>
</div>

<!-- Modal -->
<div id="modal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal()">✕</button>
        <div id="modal-ui"></div>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRAd4pEtxlxD_EaVYx4L_vhhz0U3WmPYNxOXENt1NiTEGRZjpoIECzIRQSQDYhmjGQQYGN6VaMUuQ-C/pub?gid=287695265&single=true&output=csv";
    let database = [];

    async function loadData() {
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();
            
            // Parsing Baris (Menangani koma dalam kutipan agar artikel tidak berantakan)
            const rows = csvText.split(/\r?\n/).slice(1);
            let vHtml = "", aHtml = "";

            rows.forEach((row, index) => {
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || row.split(',');
                if(cols.length < 3) return;

                const clean = (val) => val ? val.replace(/^"|"$/g, '').trim() : "";
                const item = {
                    id: index,
                    tipe: clean(cols[0]).toLowerCase(),
                    judul: clean(cols[1]),
                    isi: clean(cols[2]),
                    link: clean(cols[3]),
                    tgl: clean(cols[4]) || "",
                    kat: clean(cols[5]) || ""
                };
                database.push(item);

                // Template Card
                const cardHtml = `
                    <div class="card" onclick="openContent(${index})">
                        <div class="thumb" ${item.tipe === 'artikel' ? 'style="background:var(--primary)"' : ''}>
                            ${item.tipe === 'video' ? 
                                `<img src="https://img.youtube.com/vi/${item.link.split('embed/')[1] || item.link.split('/').pop()}/mqdefault.jpg" onerror="this.src='https://placehold.co/200x150?text=LED+Video'">
                                 <span class="play-icon">▶</span>` : 
                                `<span style="font-size:28px; color:white;">📄</span>`
                            }
                        </div>
                        <div class="card-body">
                            <div class="card-title">${item.judul}</div>
                        </div>
                    </div>`;

                if(item.tipe === 'video') vHtml += cardHtml;
                else if(item.tipe === 'artikel') aHtml += cardHtml;
            });

            document.getElementById('loader').classList.add('hide');
            if(vHtml) { 
                document.getElementById('grid-video').innerHTML = vHtml; 
                document.getElementById('sec-video').classList.remove('hide'); 
            }
            if(aHtml) { 
                document.getElementById('grid-artikel').innerHTML = aHtml; 
                document.getElementById('sec-artikel').classList.remove('hide'); 
            }
        } catch (e) {
            document.getElementById('loader').innerText = "Gagal memuat. Pastikan Google Sheet sudah di-Publish ke Web.";
        }
    }

    function openContent(id) {
        const item = database[id];
        const ui = document.getElementById('modal-ui');
        
        // Tampilan Full Video
        if(item.tipe === 'video') {
            const embed = item.link.includes('embed') ? item.link : item.link.replace("watch?v=", "embed/");
            ui.innerHTML = `
                <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:10px;background:#000;">
                    <iframe style="position:absolute;top:0;left:0;width:100%;height:100%;border:0" src="${embed}?autoplay=1" allowfullscreen></iframe>
                </div>
                <h3 style="margin-top:15px; color:var(--primary);">${item.judul}</h3>
                <div style="font-size:12px; color:#999; margin-bottom:10px;">Kategori: ${item.kat} | ${item.tgl}</div>
                <div class="modal-body">${item.isi}</div>`;
        } 
        // Tampilan Full Artikel
        else {
            ui.innerHTML = `
                <h2 style="color:var(--primary); font-size:18px; line-height:1.4;">${item.judul}</h2>
                <div style="display:flex; justify-content:space-between; font-size:12px; color:#999;">
                    <span>📅 ${item.tgl}</span>
                    <span style="background:#e0f7fa; color:#00838f; padding:2px 8px; border-radius:5px;">${item.kat}</span>
                </div>
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                <div class="modal-body">${item.isi}</div>`;
        }
        
        document.getElementById('modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
        document.getElementById('modal-ui').innerHTML = '';
    }

    window.onload = loadData;
</script>
</body>
</html>
