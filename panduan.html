<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edukasi Duta Terang</title>
    <style>
        :root { --primary: #00bcd4; --bg: #ffffff; --text: #333; --card-bg: #f9f9f9; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; }

        /* Navbar Simpel */
        .nav { background: #fff; padding: 15px; color: var(--primary); display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
        .nav a { text-decoration: none; color: var(--primary); font-size: 14px; font-weight: bold; margin-right: 15px; }
        .nav-title { font-size: 16px; font-weight: 800; letter-spacing: 1px; color: #222; }

        .container { padding: 10px 0; max-width: 900px; margin: auto; }
        
        /* Heading */
        h2 { font-size: 16px; margin: 20px 15px 10px; display: flex; align-items: center; justify-content: space-between; color: #222; }
        h2 span { font-size: 11px; color: var(--primary); font-weight: normal; }

        /* Horizontal Scroll System */
        .scroll-container { 
            display: flex; 
            overflow-x: auto; 
            gap: 12px; 
            padding: 5px 15px 15px; 
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .scroll-container::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

        /* Card Styling - Dibuat lebih ramping */
        .card { 
            flex: 0 0 140px; /* Lebar card tetap */
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
            scroll-snap-align: start;
            border: 1px solid #f0f0f0;
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.95); }
        
        .thumb { width: 100%; height: 85px; background: #eee; display: flex; align-items: center; justify-content: center; position: relative; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .play-btn { position: absolute; color: white; font-size: 18px; background: rgba(0,0,0,0.3); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        .card-body { padding: 8px; flex-grow: 1; }
        .card-title { font-size: 11px; font-weight: 600; line-height: 1.4; color: #333; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; max-height: 85vh; border-radius: 20px; overflow-y: auto; padding: 20px; position: relative; }
        .close-modal { position: sticky; top: 0; float: right; background: #eee; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; cursor: pointer; z-index: 10; }
        .modal-body { line-height: 1.6; font-size: 14px; margin-top: 15px; white-space: pre-wrap; color: #555; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .loading { text-align: center; padding: 50px; color: #ccc; font-size: 12px; }
        .hide { display: none; }
        
        marquee { background: #f0f0f0; padding: 5px; font-size: 11px; color: #666; }
    </style>
</head>
<body>

<nav class="nav">
    <a href="https://vesatukio.github.io/jualled/">⬅</a>
    <span class="nav-title">DUTA TERANG</span>
</nav>

<marquee scrollamount="4">Update tutorial servis LED & Audio System terbaru setiap hari!</marquee>

<div class="container">
    <div id="loader" class="loading">Memuat data...</div>

    <!-- Section Video -->
    <section id="sec-video" class="hide">
        <h2>📽️ Tutorial Video <span>Geser ke samping ›</span></h2>
        <div id="grid-video" class="scroll-container"></div>
    </section>

    <!-- Section Artikel -->
    <section id="sec-artikel" class="hide">
        <h2>📖 Artikel Teknik <span>Geser ke samping ›</span></h2>
        <div id="grid-artikel" class="scroll-container"></div>
    </section>
</div>

<!-- Modal -->
<div id="modal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal()">✕</button>
        <div id="modal-ui"></div>
    </div>
</div>

<script>
    const URL_VIDEO = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRAd4pEtxlxD_EaVYx4L_vhhz0U3WmPYNxOXENt1NiTEGRZjpoIECzIRQSQDYhmjGQQYGN6VaMUuQ-C/pub?gid=287695265&single=true&output=csv";
    const URL_ARTIKEL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRAd4pEtxlxD_EaVYx4L_vhhz0U3WmPYNxOXENt1NiTEGRZjpoIECzIRQSQDYhmjGQQYGN6VaMUuQ-C/pub?gid=514579729&single=true&output=csv";
    
    let dbVideo = [];
    let dbArtikel = [];

    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        return lines.filter(l => l.trim() !== '').map(line => {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"' && line[i+1] === '"') { current += '"'; i++; }
                else if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
                else { current += char; }
            }
            result.push(current);
            return result;
        });
    }

    function getYoutubeId(url) {
        if (!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    async function loadData() {
        try {
            const [resVid, resArt] = await Promise.all([
                fetch(URL_VIDEO).then(r => r.text()),
                fetch(URL_ARTIKEL).then(r => r.text())
            ]);

            const rowsVid = parseCSV(resVid).slice(1);
            const rowsArt = parseCSV(resArt).slice(1);

            let vHtml = "";
            rowsVid.forEach((cols, i) => {
                if(cols.length < 2) return;
                const item = { judul: cols[1], isi: cols[2], link: cols[3], vidId: getYoutubeId(cols[3]) };
                dbVideo.push(item);
                vHtml += `
                    <div class="card" onclick="openContent('video', ${i})">
                        <div class="thumb">
                            <img src="https://img.youtube.com/vi/${item.vidId}/mqdefault.jpg">
                            <div class="play-btn">▶</div>
                        </div>
                        <div class="card-body"><div class="card-title">${item.judul}</div></div>
                    </div>`;
            });

            let aHtml = "";
            rowsArt.forEach((cols, i) => {
                if(cols.length < 2) return;
                const item = { judul: cols[1], isi: cols[2], tgl: cols[4], kat: cols[5] };
                dbArtikel.push(item);
                aHtml += `
                    <div class="card" onclick="openContent('artikel', ${i})">
                        <div class="thumb" style="background:var(--primary); opacity:0.1;"></div>
                        <div style="position:absolute; width:140px; height:85px; display:flex; align-items:center; justify-content:center; font-size:30px;">📄</div>
                        <div class="card-body"><div class="card-title">${item.judul}</div></div>
                    </div>`;
            });

            document.getElementById('loader').classList.add('hide');
            if(vHtml) { document.getElementById('grid-video').innerHTML = vHtml; document.getElementById('sec-video').classList.remove('hide'); }
            if(aHtml) { document.getElementById('grid-artikel').innerHTML = aHtml; document.getElementById('sec-artikel').classList.remove('hide'); }

        } catch (e) {
            document.getElementById('loader').innerText = "Gagal memuat data.";
        }
    }

    function openContent(type, index) {
        const item = type === 'video' ? dbVideo[index] : dbArtikel[index];
        const ui = document.getElementById('modal-ui');
        
        if(type === 'video') {
            ui.innerHTML = `
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/${item.vidId}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
                </div>
                <h3 style="margin-top:15px; color:#222; font-size:16px;">${item.judul}</h3>
                <div class="modal-body">${item.isi}</div>`;
        } else {
            ui.innerHTML = `
                <h2 style="color:var(--primary); font-size:18px; margin:0 0 10px 0;">${item.judul}</h2>
                <div style="font-size:11px; color:#999;">📅 ${item.tgl} | 🏷️ ${item.kat}</div>
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                <div class="modal-body">${item.isi}</div>`;
        }
        document.getElementById('modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
        document.getElementById('modal-ui').innerHTML = '';
    }

    window.onload = loadData;
</script>
</body>
</html>
