<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Duta Terang LED</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00bcd4">

    <style>
        :root { 
            --primary: #00bcd4; 
            --pink: #e91e63; 
            --wa: #25D366; 
            --danger: #ff4d4d;
        }
        
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f6f8; padding-bottom: 140px; }
        
        header { background: var(--primary); color: #fff; text-align: center; padding: 12px; position: relative; }
        header b { font-size: 1.1rem; }
        
        .running-wrap { overflow: hidden; white-space: nowrap; margin-top: 5px; background: rgba(0,0,0,0.1); padding: 4px 0; }
        .running-track { display: flex; width: max-content; animation: marquee 20s linear infinite; }
        .running-track span { padding-right: 50px; font-size: 11px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .category { display: flex; gap: 8px; padding: 10px; background: #fff; position: sticky; top: 0; z-index: 100; overflow-x: auto; border-bottom: 1px solid #eee; }
        .category::-webkit-scrollbar { display: none; }
        .category button { border: none; padding: 6px 15px; border-radius: 20px; background: #f0f0f0; cursor: pointer; white-space: nowrap; font-size: 12px; font-weight: 600; }
        .category button.active { background: var(--primary); color: #fff; }

        .container { padding: 8px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 800px; margin: auto; }
        .card { background: #fff; border-radius: 10px; padding: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; height: 100%; box-sizing: border-box; position: relative; }
        
        .card img { 
            width: 100%; height: 120px; object-fit: contain; 
            background: #f9f9f9; border-radius: 8px; cursor: zoom-in;
        }

        .card-info { margin-top: 6px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-info b { 
            font-size: 13px; color: #333; line-height: 1.1; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; 
            overflow: hidden; height: 28px; margin-bottom: 0;
        }

        .price-new { 
            color: var(--pink); font-weight: 700; font-size: 14px; 
            margin-top: -3px; line-height: 1; 
        }
        
        .qty { display: flex; justify-content: space-between; align-items: center; background: #f1f3f4; border-radius: 6px; padding: 2px; margin-top: 6px; }
        .qty button { width: 28px; height: 28px; border: none; background: var(--primary); color: #fff; border-radius: 4px; font-size: 18px; cursor: pointer; }
        .qty span { font-weight: bold; font-size: 14px; }

        #cart { 
            position: fixed; bottom: 12px; left: 12px; right: 12px; 
            background: #fff; padding: 12px; border-radius: 12px; 
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15); 
            z-index: 999; display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s transform ease-out;
        }
        #cart.hide { transform: translateY(150%); }
        #summary { font-size: 12px; font-weight: 500; color: #444; white-space: pre-line; text-align: right; margin-bottom: 5px; max-height: 80px; overflow-y: auto; }
        #total { font-size: 17px; font-weight: 800; }
        #btn-wa { background: var(--wa); color: #fff; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; font-size: 14px; display: inline-block; }

        .modal-zoom {
            display: none; position: fixed; z-index: 99999; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); cursor: zoom-out; align-items: center; justify-content: center;
        }
        .modal-content { max-width: 95%; max-height: 85%; border-radius: 5px; }

        .badge-diskon {
            position: absolute; top: 5px; right: 5px; background: var(--danger);
            color: white; font-size: 10px; font-weight: bold; padding: 2px 6px;
            border-radius: 4px; z-index: 10;
        }
    </style>
</head>
<body>

<header>
    <b>DUTA TERANG LED</b>
    <div class="running-wrap">
        <div class="running-track">
            <span>⚡ COD Seluruh Indonesia • Respon Cepat 24 Jam • Produk Berkualitas • Garansi Resmi • </span>
            <span>⚡ COD Seluruh Indonesia • Respon Cepat 24 Jam • Produk Berkualitas • Garansi Resmi • </span>
        </div>
    </div>
</header>

<div class="category" id="cat-bar">
    <button class="active" onclick="filter('all', this)">Semua</button>
</div>

<div class="container" id="list">Memuat produk...</div>

<div id="cart" class="hide">
    <button onclick="resetCart()" style="background:var(--danger); border:none; padding:8px; border-radius:8px; color:#fff; font-size:11px;">🗑️ Hapus</button>
    <div style="text-align: right;">
        <div id="summary"></div>
        <div style="color:var(--primary); margin-bottom: 5px;">Total: <span id="total">0</span></div>
        <a id="btn-wa" href="#">Kirim Pesanan</a>
    </div>
</div>

<div id="zoomModal" class="modal-zoom" onclick="this.style.display='none'">
    <img id="imgZoom" class="modal-content">
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhgdk0elMuqM4-00OIR8zbUqp-k80RnbuYyPDDqGHsEk7aSCg60kgT5HTYL_hIVSDc/exec";
    let produk = [];
    let order = {};
    let total = 0;

    async function load() {
        try {
            const res = await fetch(API_URL);
            produk = await res.json();
            render();
            loadFromLocal();
        } catch (e) { 
            document.getElementById("list").innerText = "Gagal memuat data. Periksa koneksi atau izin Apps Script."; 
        }
    }

    function rupiah(n) { return "Rp " + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

    function render() {
        let htmlProduk = "";
        let setKategori = new Set();
        
        produk.forEach(p => {
            if (!p.nama) return;
            let kat = p.kategori ? p.kategori.trim() : "Lainnya";
            setKategori.add(kat);
            
            let diskonPersen = Number(p.diskon) || 0;
            let hargaDiskon = p.harga - (p.harga * diskonPersen / 100);
            let habis = Number(p.stok) <= 0;
            let imageSrc = p.gambar && p.gambar.trim() !== "" ? p.gambar : 'https://via.placeholder.com/150?text=No+Image';

            htmlProduk += `
            <div class="card" data-cat="${kat.toLowerCase()}">
                ${diskonPersen > 0 ? `<div class="badge-diskon">-${diskonPersen}%</div>` : ''}
                <img src="${imageSrc}" onclick="zoomImg('${imageSrc}')" alt="${p.nama}">
                <div class="card-info">
                    <b>${p.nama}</b>
                    <div style="margin-top: auto; display: flex; flex-direction: column;">
                        ${diskonPersen > 0 ? 
                            `<span style="text-decoration:line-through; color:#999; font-size:11px; line-height:1; margin-bottom: 1px;">${rupiah(p.harga)}</span>` : 
                            `<div style="height:12px;"></div>` 
                        }
                        <span class="price-new">${rupiah(hargaDiskon)}</span>
                    </div>
                    <div class="qty">
                        <button onclick="changeQty('${p.id}', -1, ${hargaDiskon}, '${p.nama}')">−</button>
                        <span id="qty-${p.id}">0</span>
                        <button onclick="changeQty('${p.id}', 1, ${hargaDiskon}, '${p.nama}', ${p.stok})" ${habis ? 'disabled' : ''}>+</button>
                    </div>
                </div>
            </div>`;
        });
        
        document.getElementById("list").innerHTML = htmlProduk;
        renderCatButtons(setKategori);
    }

    function renderCatButtons(kategoriSet) {
        const bar = document.getElementById("cat-bar");
        let html = `<button class="active" onclick="filter('all', this)">Semua</button>`;
        kategoriSet.forEach(k => { html += `<button onclick="filter('${k.toLowerCase()}', this)">${k}</button>`; });
        bar.innerHTML = html;
    }

    function zoomImg(src) {
        const modal = document.getElementById("zoomModal");
        document.getElementById("imgZoom").src = src;
        modal.style.display = "flex"; 
    }

    function changeQty(id, delta, price, name, stok = 999) {
        if (!order[id]) order[id] = { qty: 0, name, price };
        if (delta > 0 && order[id].qty >= stok) return;
        if (delta < 0 && order[id].qty <= 0) return;
        order[id].qty += delta;
        total += (delta * price);
        document.getElementById(`qty-${id}`).innerText = order[id].qty;
        updateCart();
    }

    function updateCart() {
        const cartEl = document.getElementById("cart");
        const summaryEl = document.getElementById("summary");
        const totalEl = document.getElementById("total");
        const waLink = document.getElementById("btn-wa");
        let hasItem = false, summaryText = "", waText = "🛒 *ORDER DUTA TERANG LED*%0A%0A";

        for (let id in order) {
            if (order[id].qty > 0) {
                hasItem = true;
                summaryText += `• ${order[id].name} (x${order[id].qty})\n`;
                waText += `• ${order[id].name} (x${order[id].qty})%0A`;
            }
        }
        totalEl.innerText = rupiah(total);
        summaryEl.innerText = summaryText;
        waLink.href = "https://wa.me/6288224166270?text=" + waText + "%0A*Total: " + rupiah(total) + "*";
        if (hasItem && total > 0) cartEl.classList.remove("hide"); else cartEl.classList.add("hide");
        localStorage.setItem("duta_terang_cart", JSON.stringify({ order, total }));
    }

    function resetCart() {
        if(confirm("Hapus semua pesanan?")) {
            order = {}; total = 0;
            localStorage.removeItem("duta_terang_cart");
            document.querySelectorAll("[id^='qty-']").forEach(el => el.innerText = "0");
            updateCart();
        }
    }

    function loadFromLocal() {
        const saved = localStorage.getItem("duta_terang_cart");
        if (saved) {
            const parsed = JSON.parse(saved);
            order = parsed.order; total = parsed.total;
            for (let id in order) {
                const el = document.getElementById(`qty-${id}`);
                if (el) el.innerText = order[id].qty;
            }
            updateCart();
        }
    }

    function filter(cat, btn) {
        document.querySelectorAll(".card").forEach(c => { 
            c.style.display = (cat === 'all' || c.dataset.cat === cat) ? 'flex' : 'none'; 
        });
        document.querySelectorAll(".category button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    }

    load();
</script>
</body>
</html>
