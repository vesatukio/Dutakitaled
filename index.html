<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duta Terang LED</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00bcd4">

<style>
body{margin:0;font-family:Arial;background:#f5f6f8}

/* HEADER */
header{
  background:#00bcd4;
  color:#fff;
  text-align:center;
  padding:10px;
  overflow:hidden;
}

/* TEXT BERJALAN */
.running-wrap{overflow:hidden;white-space:nowrap}
.running-track{
  display:flex;
  animation:marquee 12s linear infinite;
}
.running-track span{
  padding-right:50px;
  font-size:12px;
}
@keyframes marquee{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

/* CATEGORY */
.category{
  display:flex;
  gap:6px;
  padding:8px;
  background:#fff;
  position:sticky;
  top:0;
}
.category button{
  border:none;
  padding:6px 10px;
  border-radius:6px;
  background:#eee;
}
.category .active{
  background:#00bcd4;
  color:#fff;
}

/* PRODUK */
.container{
  padding:10px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  max-width:600px;
  margin:auto;
}

.card{
  background:#fff;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

.qty{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}
.qty button{
  background:#00bcd4;
  color:#fff;
  border:none;
  border-radius:6px;
}

/* CART */
#cart{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  background:#fff;
  padding:10px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  display:flex;
  justify-content:space-between;
}
#cart.hide{display:none}

/* ZOOM */
#zoom{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}
#zoom img{width:100%;height:100%;object-fit:contain}

/* INSTALL BUTTON */
#installBtn{
  position:fixed;
  bottom:80px;
  right:15px;
  background:#00bcd4;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:20px;
  display:none;
}

/* POPUP */
#installPopup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}
.popupBox{
  background:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
  position:relative;
}
.popupBox span{
  position:absolute;
  top:5px;
  right:10px;
  cursor:pointer;
}
  .harga{
  display:block;
  color:#e91e63;
  font-weight:bold;
  margin-top:2px;
}
</style>
</head>

<body>

<header>
  <b>Duta Terang LED</b>
  <div class="running-wrap">
    <div class="running-track">
      <span>COD • Seluruh Indonesia ⚡ Fast Response • </span>
      <span>Order via WA • Shopee • Tokopedia • </span>
    </div>
  </div>
</header>

<div class="category" id="category"></div>

<div class="container" id="list"></div>

<div id="cart" class="hide">

  <!-- KIRI -->
  <div>
    <button onclick="resetCart()" style="
      background:#f44336;
      color:#fff;
      border:none;
      padding:8px 12px;
      border-radius:8px;
      font-size:12px;
      cursor:pointer;
    ">
      Reset
    </button>
  </div>

  <!-- KANAN -->
  <div style="text-align:right">

    <div style="font-weight:bold;color:#00bcd4;">
      Total: Rp <span id="total">0</span>
    </div>

    <small id="summary" style="color:#666;display:block;">
      Belum ada order
    </small>

    <small id="count" style="color:#333;font-weight:bold;display:block;">
      0 item
    </small>

    <a id="wa" style="
      display:inline-block;
      margin-top:6px;
      background:#25D366;
      color:#fff;
      padding:6px 10px;
      border-radius:6px;
      text-decoration:none;
      font-size:12px;
    ">
      Checkout WA
    </a>

  </div>

</div>

<div id="zoom" onclick="this.style.display='none'">
  <img id="zoomImg">
</div>

<!-- POPUP -->
<div id="installPopup">
  <div class="popupBox">
    <span onclick="closePopup()">✖</span>
    <h3>Install App</h3>
    <p>Biar belanja lebih cepat 🚀</p>
    <button onclick="installApp()">Install</button>
  </div>
</div>

<button id="installBtn" onclick="installApp()">⬇ Install</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyhgdk0elMuqM4-00OIR8zbUqp-k80RnbuYyPDDqGHsEk7aSCg60kgT5HTYL_hIVSDc/exec";

let produk=[],order={},total=0;

/* LOAD */
async function load(){
  const res = await fetch(API_URL);
  produk = await res.json();

  renderKategori(); // ⬅️ TAMBAH INI
  render();
}

/* RENDER */
function render(){
  let html="";

  produk.forEach(p=>{

    let harga = p.harga;

    // ⬇️ TAMBAH INI
    let kategori = (p.kategori || "lain").toString().toLowerCase().trim();

    html+=`
    <div class="card" data-cat="${kategori}">
      <img src="${p.gambar}" onclick="zoom(this.src)">
      <b>${p.nama}</b><br>
<span class="harga">${rupiah(harga)}</span>
      <div class="qty">
        <button onclick="minus('${p.id}')">-</button>
        <span id="${p.id}">0</span>
        <button onclick="plus('${p.id}',${harga},'${p.nama}')">+</button>
      </div>
    </div>`;
  });

  list.innerHTML=html;
}
  function rupiah(n){
  return "Rp " + Number(n).toLocaleString("id-ID");
}
function renderKategori(){

  let kategoriSet = new Set();

  produk.forEach(p=>{
    let k = (p.kategori || "lain").toLowerCase();
    kategoriSet.add(k);
  });

  let html = `<button class="active" onclick="filter('all',this)">Semua</button>`;

  kategoriSet.forEach(k=>{
    html += `<button onclick="filter('${k}',this)">${k.toUpperCase()}</button>`;
  });

  document.getElementById("category").innerHTML = html;
}
/* CART */
function plus(id,harga,nama){
  if(!order[id]) order[id]={qty:0,nama,harga};
  order[id].qty++;
  document.getElementById(id).innerText=order[id].qty;
  total+=harga;
  update();
}

function minus(id){
  if(order[id]&&order[id].qty>0){
    order[id].qty--;
    document.getElementById(id).innerText=order[id].qty;
    total-=order[id].harga;
    update();
  }
}

function update(){
  totalEl.innerText=total;
  cart.classList.remove("hide");

  let text="Order:%0A";
  for(let k in order){
    if(order[k].qty>0){
      text+=order[k].nama+" x"+order[k].qty+"%0A";
    }
  }
  wa.href="https://wa.me/6288224166270?text="+text;
}

function resetCart(){
  order={};total=0;
  document.querySelectorAll(".qty span").forEach(e=>e.innerText=0);
  cart.classList.add("hide");
}

/* ZOOM */
function zoom(src){
  zoomImg.src=src;
  zoom.style.display="flex";
}

/* FILTER */
function filter(cat,btn){

  // filter produk
  document.querySelectorAll(".card").forEach(c=>{
    let cc = c.dataset.cat;
    c.style.display = (cat==="all" || cc===cat) ? "block" : "none";
  });

  // aktifkan tombol
  document.querySelectorAll(".category button").forEach(b=>{
    b.classList.remove("active");
  });

  btn.classList.add("active");
}

/* ================= PWA ================= */
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt=e;

  installBtn.style.display="block";

  setTimeout(()=>{
    installPopup.style.display="flex";
  },3000);
});

function installApp(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
}

function closePopup(){
  installPopup.style.display="none";
}

installPopup.addEventListener("click",(e)=>{
  if(e.target.id==="installPopup") closePopup();
});

/* SW */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

load();
</script>

</body>
</html>
