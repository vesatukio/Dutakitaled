<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Duta Terang LED</title>
    <style>
        :root { --primary: #00bcd4; --pink: #e91e63; --wa: #25D366; --danger: #ff4d4d; --blue-old: #2196F3; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: #f5f6f8; padding-bottom: 300px; }
        
        /* HEADER & NAVIGATION */
        .top-nav { position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: #fff; }
        header { background: var(--primary); color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .promo-running { background: #fff3cd; color: #856404; font-size: 12px; padding: 6px 0; font-weight: bold; border-bottom: 1px solid #ffeeba; }
        
        /* GRID PRODUK */
        .container { padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: #fff; border-radius: 12px; padding: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); position: relative; display: flex; flex-direction: column; transition: 0.3s; }
        .card img { width: 100%; height: 120px; object-fit: contain; border-radius: 8px; cursor: zoom-in; background: #fafafa; }
        
        .product-name { font-size: 13px; font-weight: bold; margin-top: 8px; line-height: 1.2; color: #222; min-height: 32px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price-row { margin-top: 5px; min-height: 35px; }
        .price-old { font-size: 11px; color: var(--blue-old); text-decoration: line-through; font-weight: bold; display: block; line-height: 1; }
        .price-new { color: var(--pink); font-weight: 900; font-size: 16px; display: block; margin-top: 2px; }
        
        /* TOMBOL QTY */
        .qty-wrapper { display: flex; align-items: center; justify-content: space-between; background: #f0f0f0; border-radius: 6px; margin-top: 10px; overflow: hidden; height: 32px; }
        .qty-wrapper button { width: 35px; height: 100%; border: none; background: var(--primary); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .qty-wrapper button:disabled { background: #ccc; }
        .qty-wrapper span { font-size: 14px; font-weight: bold; color: #333; flex-grow: 1; text-align: center; }

        .badge-disc { position: absolute; top: 8px; right: 8px; background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; z-index: 10; }

        /* PANEL KERANJANG - VERSI RAMPING (DIPERBAIKI) */
        #cart { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: #fff; 
            padding: 8px 12px; /* Diperkecil dari 15px */
            border-top: 3px solid var(--primary); 
            display: flex; 
            gap: 10px; 
            z-index: 2000; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); 
            max-height: 200px; /* MEMBATASI TINGGI AGAR TIDAK TUTUP PRODUK */
            overflow-y: auto; 
        }

        .cart-left { 
            flex: 1.3; 
            display: flex; 
            flex-direction: column; 
            gap: 4px; /* Jarak antar input dipersempit */
        }

        .cart-left label { 
            font-size: 9px; /* Label diperkecil */
            font-weight: bold; 
            color: #888; 
            margin-bottom: -2px; 
        }

        .cart-left input, .cart-left select, .cart-left textarea { 
            width: 100%; 
            padding: 5px 8px; /* Padding input diperkecil agar tipis */
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-size: 12px; 
            box-sizing: border-box; 
            background: #fafafa;
        }

        #f_alamat { 
            height: 45px; /* Tinggi kotak alamat diperkecil */
            resize: none; 
        }
        
        .cart-right { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            border-left: 1px dashed #ddd; 
            padding-left: 10px; 
            justify-content: space-between;
        }

        #total { 
            font-size: 16px; /* Ukuran total diperkecil sedikit */
            font-weight: 900; 
            color: var(--pink); 
            text-align: right; 
        }

        #cart-list-render { 
            font-family: monospace; 
            font-size: 10px; 
            color: #666; 
            max-height: 60px; /* List belanja tidak usah terlalu panjang */
            overflow-y: auto; 
            margin: 4px 0;
        }
        
        #btn-wa { 
            background: var(--wa); 
            color: #fff; 
            border: none; 
            padding: 8px; /* Tombol lebih ramping */
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: bold; 
            cursor: pointer; 
        } </style>
</head>
<body>

<div class="top-nav">
    <header>
        <div style="font-weight: 900; font-size: 18px;">DUTA TERANG LED</div>
        <div style="font-size: 11px; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px;">📲 1.284 Terpasang</div>
    </header>
    <div class="promo-running">
        <marquee behavior="scroll" direction="left" scrollamount="6">
            📢 INFO: Sparepart LED Berkualitas | Ready Stok LED AC 5W-50W | Bisa COD (Bayar di Tempat)
        </marquee>
    </div>
</div>

<div id="installModal" class="modal">
    <div class="promo-box">
        <div style="font-size: 45px;">🏪</div>
        <h3 style="margin:10px 0 5px; color:var(--primary);">Duta Terang LED</h3>
        <p style="font-size:13px; color: #555; line-height: 1.4;">Simpan aplikasi ini di layar utama agar belanja lebih mudah!</p>
        <button onclick="alert('Tekan ikon Titik Tiga (⋮) lalu pilih Instal Aplikasi')" style="background: var(--pink); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin: 15px 0 10px;">📲 PASANG SEKARANG</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#999; font-size:13px; cursor:pointer;">Lain kali</button>
    </div>
</div>

<div id="cat-bar" style="display:flex; gap:10px; padding:12px; background:#fff; overflow-x:auto; border-bottom:1px solid #eee;"></div>

<div id="list" class="container">Memuat Produk...</div>

<div id="zoomModal" onclick="this.style.display='none'"><img id="imgZoom" src="" style="max-width:90%; max-height:80%; border-radius:10px;"></div>

<!-- PANEL KERANJANG VERSI RAMPING -->
<div id="cart" class="hide">
    <div class="cart-left">
        <div style="display: flex; gap: 5px; margin-bottom: 2px;">
            <button onclick="resetCart()" style="font-size:8px; padding:2px; flex:1;">🗑️ Reset</button>
            <button onclick="hapusIdentitas()" style="font-size:8px; padding:2px; flex:1;">❌ Hapus Data</button>
        </div>
        
        <label>Nama</label>
        <input type="text" id="f_nama" placeholder="Nama Anda">
        
        <label>WA</label>
        <input type="number" id="f_wa" placeholder="08xxx">
        
        <label>Alamat</label>
        <textarea id="f_alamat" placeholder="Alamat lengkap..."></textarea>
        
        <label>Bayar</label>
        <select id="f_bayar">
            <option value="COD">COD</option>
            <option value="Transfer">Transfer</option>
        </select>
    </div>

    <div class="cart-right">
        <div style="font-size: 10px; color: #777;">Total Tagihan:</div>
        <div id="total">Rp 0</div>
        <div id="cart-list-render"></div>
        <button id="btn-wa" onclick="prosesPemesanan()">ORDER SEKARANG</button>
    </div>
</div>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhgdk0elMuqM4-00OIR8zbUqp-k80RnbuYyPDDqGHsEk7aSCg60kgT5HTYL_hIVSDc/exec";
    const WA_NUMBER = "6288224166270";
    let produk = [], order = {};

    window.onload = () => {
        if(!localStorage.getItem('promo_seen_v4')) {
            setTimeout(() => { document.getElementById('installModal').style.display = 'flex'; }, 2000);
        }
        load();
    };

    function closeModal() {
        document.getElementById('installModal').style.display = 'none';
        localStorage.setItem('promo_seen_v4', 'true');
    }

    async function load() {
        try {
            const res = await fetch(API_URL);
            produk = await res.json();
            render();
            autoFillForm();
        } catch (e) { document.getElementById("list").innerText = "Gagal memuat produk. Periksa koneksi."; }
    }

    function render() {
        let html = "", kategori = new Set();
        produk.forEach(p => {
            if (!p.nama) return;
            const kat = p.kategori || "Lainnya";
            kategori.add(kat);
            const disc = Number(p.diskon) || 0;
            const hrgFix = p.harga - (p.harga * disc / 100);
            const isHabis = p.stok <= 0;

            html += `
            <div class="card" data-category="${kat.toLowerCase()}">
                ${isHabis ? '<div style="position:absolute; inset:0; background:rgba(255,255,255,0.7); color:red; display:flex; align-items:center; justify-content:center; font-weight:900; z-index:5; border-radius:12px;">HABIS</div>' : ''}
                ${disc > 0 ? `<div class="badge-disc">-${disc}%</div>` : ''}
                <img src="${p.gambar || 'https://via.placeholder.com/150'}" onclick="openZoom('${p.gambar}')">
                <div class="product-name">${p.nama}</div>
                <div class="price-row">
                    ${disc > 0 ? `<span class="price-old">Rp ${p.harga.toLocaleString('id-ID')}</span>` : ''}
                    <span class="price-new">Rp ${hrgFix.toLocaleString('id-ID')}</span>
                </div>
                <div class="qty-wrapper">
                    <button onclick="changeQty('${p.id}', -1, ${hrgFix}, '${p.nama}')" ${isHabis?'disabled':''}>-</button>
                    <span id="qty-${p.id}">0</span>
                    <button onclick="changeQty('${p.id}', 1, ${hrgFix}, '${p.nama}')" ${isHabis?'disabled':''}>+</button>
                </div>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
        
        let catHtml = '<button onclick="filter(\'all\', this)" style="border:1px solid var(--primary); padding:8px 16px; border-radius:20px; background:var(--primary); color:#fff; font-size:12px; white-space:nowrap; font-weight:bold;">Semua</button>';
        kategori.forEach(k => {
            catHtml += `<button onclick="filter('${k.toLowerCase()}', this)" style="border:1px solid #ddd; padding:8px 16px; border-radius:20px; background:#fff; font-size:12px; white-space:nowrap; margin-left:8px; color:#444;">${k}</button>`;
        });
        document.getElementById("cat-bar").innerHTML = catHtml;
    }

    function changeQty(id, delta, price, name) {
        if (!order[id]) order[id] = { qty: 0, name, price };
        order[id].qty += delta;
        if (order[id].qty <= 0) delete order[id];
        
        const el = document.getElementById(`qty-${id}`);
        if(el) el.innerText = order[id] ? order[id].qty : 0;
        updateCart();
    }

    function updateCart() {
        let total = 0, renderText = "";
        for (let id in order) {
            total += (order[id].qty * order[id].price);
            renderText += `${order[id].name} (x${order[id].qty})\n`;
        }
        document.getElementById("total").innerText = "Rp " + total.toLocaleString('id-ID');
        document.getElementById("cart-list-render").innerText = renderText;
        document.getElementById("cart").classList.toggle("hide", total === 0);
    }

    function autoFillForm() {
        const fields = ['f_nama', 'f_wa', 'f_alamat'];
        fields.forEach(id => {
            const saved = localStorage.getItem(id);
            if (saved) document.getElementById(id).value = saved;
            
            document.getElementById(id).addEventListener('input', (e) => {
                localStorage.setItem(id, e.target.value);
            });
        });
    }

    function hapusIdentitas() {
        if(confirm("Hapus data Nama & Alamat?")) {
            ['f_nama', 'f_wa', 'f_alamat'].forEach(id => {
                localStorage.removeItem(id);
                document.getElementById(id).value = "";
            });
        }
    }

    function resetCart() {
        if(confirm("Kosongkan keranjang?")) {
            order = {};
            updateCart();
            document.querySelectorAll("[id^='qty-']").forEach(e => e.innerText = "0");
        }
    }

    async function prosesPemesanan() {
        const n = document.getElementById("f_nama").value;
        const w = document.getElementById("f_wa").value;
        const a = document.getElementById("f_alamat").value;
        const b = document.getElementById("f_bayar").value;

        if(!n || !w || !a) return alert("Lengkapi Nama & Alamat bos!");

        const totalText = document.getElementById("total").innerText;
        const pesananText = document.getElementById("cart-list-render").innerText;

        // Kirim ke Google Sheets (Background)
        fetch(API_URL, { 
            method: "POST", 
            body: JSON.stringify({ nama: n, whatsapp: w, alamat: a, total: totalText, pesanan: pesananText, pembayaran: b }) 
        }).catch(err => console.log("Sheet Error"));

        // Format WA
        let m = `*PESANAN DUTA TERANG LED*\n`;
        m += `--------------------------\n${pesananText}`;
        m += `--------------------------\n`;
        m += `*Total: ${totalText}*\n\n`;
        m += `👤 Nama: ${n}\n📱 WA: ${w}\n📍 Alamat: ${a}\n💳 Bayar: ${b}`;
        
        window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(m)}`);
    }

    function filter(cat, btn) {
        document.querySelectorAll(".card").forEach(c => {
            if(cat === 'all' || c.getAttribute('data-category') === cat) c.style.display = 'flex';
            else c.style.display = 'none';
        });
        document.querySelectorAll("#cat-bar button").forEach(b => { 
            b.style.background = '#fff'; b.style.color = '#444'; b.style.borderColor = '#ddd'; 
        });
        btn.style.background = 'var(--primary)'; btn.style.color = '#fff'; btn.style.borderColor = 'var(--primary)';
    }

    function openZoom(url) { 
        if(!url || url.includes('placeholder')) return;
        document.getElementById("imgZoom").src = url; 
        document.getElementById("zoomModal").style.display = 'flex'; 
    }
</script>
</body>
</html>
