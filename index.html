<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00bcd4">
    <title>Duta Terang LED</title>

    <!-- ICON ANDROID / IOS -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root {
            --primary: #00bcd4;
            --secondary: #e91e63;
            --success: #25D366;
            --bg-body: #f5f6f8;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            color: #333;
            padding-bottom: 100px; /* Space for floating cart */
        }

        /* --- HEADER & ANNOUNCEMENT --- */
        header {
            background: var(--primary);
            color: #fff;
            text-align: center;
            padding: 15px 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .running-wrap {
            overflow: hidden;
            white-space: nowrap;
            margin-top: 8px;
            background: rgba(0,0,0,0.1);
            padding: 4px 0;
        }

        .running-track {
            display: flex;
            width: max-content;
            animation: marquee 20s linear infinite;
        }

        .running-track span {
            font-size: 11px;
            font-weight: bold;
            padding-right: 50px;
            text-transform: uppercase;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- CATEGORY --- */
        .category {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #fff;
            overflow-x: auto;
            border-bottom: 1px solid #eee;
        }

        .category button {
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: #eee;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .category button.active {
            background: var(--primary);
            color: #fff;
        }

        /* --- PRODUCT GRID --- */
        .container {
            padding: 15px;
            max-width: 800px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .card {
            background: #fff;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
            transition: transform 0.2s;
        }

        .card:active { transform: scale(0.98); }

        .card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            cursor: zoom-in;
        }

        .card-info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card b {
            font-size: 14px;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 36px;
        }

        .price-old { font-size: 11px; color: #999; text-decoration: line-through; }
        .price-new { color: var(--secondary); font-weight: bold; font-size: 15px; }

        /* --- BADGES --- */
        .discount {
            position: absolute; top: 8px; right: 8px;
            background: var(--secondary); color: #fff;
            font-size: 10px; font-weight: bold;
            padding: 3px 7px; border-radius: 4px;
        }

        .habis {
            position: absolute; top: 8px; left: 8px;
            background: rgba(0,0,0,0.7); color: #fff;
            font-size: 10px; padding: 3px 7px; border-radius: 4px;
        }

        /* --- QTY CONTROL --- */
        .qty {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 10px;
        }

        .qty button {
            width: 30px; height: 30px;
            border: none;
            background: var(--primary);
            color: #fff;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .qty button:disabled { background: #ccc; }

        /* --- FLOATING CART --- */
        #cart {
            position: fixed;
            bottom: 20px; left: 15px; right: 15px;
            background: #fff;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #cart.hide { transform: translateY(150%); opacity: 0; }

        #summary {
            font-size: 11px;
            color: #666;
            margin-bottom: 5px;
        }

        #wa {
            background: var(--success);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }

        /* --- ZOOM MODAL --- */
        #zoom {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center;
            z-index: 2000;
        }

        #zoom img { max-width: 90%; max-height: 80%; border-radius: 8px; }

        @media (max-width: 400px) {
            .container { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        }
    </style>
</head>

<body>

<header>
    <b>DUTA TERANG LED</b>
    <div class="running-wrap">
        <div class="running-track">
            <span>⚡ COD Seluruh Indonesia • Respon Cepat 24 Jam • Produk Berkualitas Terjamin • </span>
            <span>⚡ Order bisa via Shopee, TikTok, Tokopedia • Pengiriman Kilat • </span>
        </div>
    </div>
    <button id="installBtn" style="margin-top:10px; padding:8px 12px; border:none; border-radius:20px; background:#fff; color:var(--primary); font-size:11px; font-weight:bold; display:none; cursor:pointer;">
        📲 INSTALL APP
    </button>
</header>

<div class="category">
    <button class="active" onclick="filter('all',this)">Semua</button>
    <button onclick="filter('led',this)">LED</button>
    <button onclick="filter('alat',this)">Alat</button>
    <button onclick="filter('casing',this)">Casing</button>
</div>

<div class="container" id="list">
    <!-- Produk akan muncul di sini -->
</div>

<div id="cart" class="hide">
    <div>
        <button onclick="resetCart()" style="background:none; border:1px solid #ddd; color:#999; padding:8px 12px; border-radius:8px; font-size:12px; cursor:pointer;">
            Reset
        </button>
    </div>

    <div style="text-align: right;">
        <div id="summary">Belum ada order</div>
        <div style="font-weight:bold; color:var(--primary); font-size:16px; margin-bottom:8px;">
            Total: <span id="total">0</span>
        </div>
        <a id="wa" href="#">Checkout WA</a>
    </div>
</div>

<div id="zoom" onclick="this.style.display='none'">
    <img id="zoomImg">
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhgdk0elMuqM4-00OIR8zbUqp-k80RnbuYyPDDqGHsEk7aSCg60kgT5HTYL_hIVSDc/exec";
    let produk = [];
    let order = {};
    let total = 0;

    // Load Data
    async function load() {
        try {
            const res = await fetch(API_URL);
            produk = await res.json();
            render();
        } catch (err) {
            console.error("Gagal memuat data:", err);
            document.getElementById("list").innerHTML = "<p>Gagal memuat data produk...</p>";
        }
    }

    function rupiah(n) {
        return "Rp " + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function render() {
        let html = "";
        produk.forEach(p => {
            if (!p || !p.nama || !p.harga) return;

            let kategori = (p.kategori || "lain").toLowerCase();
            let hargaDiskon = p.harga - (p.harga * (p.diskon || 0) / 100);
            let habis = Number(p.stok) <= 0;
            let img = (p.gambar && p.gambar.startsWith("http")) ? p.gambar : "https://via.placeholder.com/150";

            html += `
            <div class="card" data-cat="${kategori}">
                ${p.diskon > 0 ? `<div class="discount">-${p.diskon}%</div>` : ""}
                ${habis ? `<div class="habis">HABIS</div>` : ""}
                <img src="${img}" loading="lazy" onclick="zoom('${img}')">
                <div class="card-info">
                    <b>${p.nama}</b>
                    ${p.diskon > 0 ? 
                        `<span class="price-old">${rupiah(p.harga)}</span>
                         <span class="price-new">${rupiah(hargaDiskon)}</span>` : 
                        `<span class="price-new">${rupiah(p.harga)}</span>`
                    }
                    <div class="qty">
                        <button onclick="minus('${p.id}')" ${habis ? 'disabled' : ''}>−</button>
                        <span id="qty-${p.id}" style="font-weight:bold">0</span>
                        <button onclick="plus('${p.id}', ${hargaDiskon}, '${p.nama}', ${p.stok})" ${habis ? 'disabled' : ''}>+</button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
    }

    function plus(id, price, name, stok) {
        if (!order[id]) order[id] = { qty: 0, name, price };
        if (order[id].qty >= stok) return alert("Stok terbatas!");

        order[id].qty++;
        document.getElementById("qty-" + id).innerText = order[id].qty;
        total += price;
        update();
    }

    function minus(id) {
        if (order[id] && order[id].qty > 0) {
            total -= order[id].price;
            order[id].qty--;
            document.getElementById("qty-" + id).innerText = order[id].qty;
            update();
        }
    }

    function update() {
        document.getElementById("total").innerText = rupiah(total);
        const cartEl = document.getElementById("cart");
        
        let hasItem = false;
        let waText = "🛒 *ORDER DUTA TERANG LED*%0A%0A";
        let summaryText = "";
        let itemCount = 0;

        for (let k in order) {
            if (order[k].qty > 0) {
                hasItem = true;
                let line = `• ${order[k].name} (x${order[k].qty})`;
                waText += line + "%0A";
                summaryText += line + "\n";
                itemCount += order[k].qty;
            }
        }

        waText += `%0A*Total: ${rupiah(total)}*%0A*Item: ${itemCount} pcs*%0A%0AMohon diproses kak 🙏`;
        
        document.getElementById("summary").innerText = summaryText || "Belum ada order";
        document.getElementById("wa").href = "https://wa.me/6288224166270?text=" + waText;

        if (hasItem) cartEl.classList.remove("hide");
        else cartEl.classList.add("hide");
    }

    function filter(cat, btn) {
        document.querySelectorAll(".card").forEach(c => {
            c.style.display = (cat === "all" || c.dataset.cat === cat) ? "flex" : "none";
        });
        document.querySelectorAll(".category button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    }

    function zoom(src) {
        document.getElementById("zoomImg").src = src;
        document.getElementById("zoom").style.display = "flex";
    }

    function resetCart() {
        if(confirm("Hapus semua pesanan?")) {
            order = {};
            total = 0;
            document.querySelectorAll("[id^='qty-']").forEach(el => el.innerText = "0");
            update();
        }
    }

    // PWA & Service Worker
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(console.error);
    }

    let deferredPrompt;
    window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById("installBtn").style.display = "inline-block";
    });

    document.getElementById("installBtn").addEventListener("click", async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt = null;
            document.getElementById("installBtn").style.display = "none";
        }
    });

    load();
</script>

</body>
</html>
