<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Duta Terang LED</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00bcd4">

    <style>
        :root { 
            --primary: #00bcd4; 
            --pink: #e91e63; 
            --wa: #25D366; 
            --danger: #ff4d4d;
        }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f5f6f8; padding-bottom: 180px; }
        
        header { background: var(--primary); color: #fff; text-align: center; padding: 12px; font-size: 16px; }

        /* MODAL POPUP AWAL */
        #installModal {
            display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center;
        }
        .promo-box {
            background: #fff; width: 80%; max-width: 300px; padding: 20px; border-radius: 15px;
            text-align: center;
        }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; }

        /* INSTALL KECIL KANAN */
        #installFloat {
            display: none; position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            background: var(--primary); color: white; border: none; padding: 10px 5px;
            border-radius: 8px 0 0 8px; font-size: 10px; font-weight: bold; z-index: 9999;
            writing-mode: vertical-rl;
        }

        /* KATEGORI */
        .category { display: flex; gap: 8px; padding: 10px; background: #fff; position: sticky; top: 0; z-index: 100; overflow-x: auto; border-bottom: 1px solid #eee; }
        .category button { border: 1px solid #ddd; padding: 6px 14px; border-radius: 20px; background: #fff; color: #555; font-size: 12px; white-space: nowrap; }
        .category button.active { background: var(--primary) !important; color: #fff !important; border-color: var(--primary) !important; }

        /* PRODUK (KEMBALI KE 2 KOLOM RAPI) */
        .container { padding: 8px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 600px; margin: auto; }
        .card { background: #fff; border-radius: 10px; padding: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; }
        .card img { width: 100%; height: 110px; object-fit: contain; background: #f9f9f9; border-radius: 8px; }
        .price-old { text-decoration: line-through; color: blue; font-size: 12px; font-weight: bold; }
        .price-new { color: var(--pink); font-weight: bold; font-size: 14px; }
        
        .qty { display: flex; justify-content: space-between; align-items: center; background: #f1f3f4; border-radius: 6px; padding: 2px; margin-top: 8px; }
        .qty button { width: 28px; height: 28px; border: none; background: var(--primary); color: #fff; border-radius: 4px; font-size: 16px; }

        /* KERANJANG RINGKAS */
        #cart { 
            position: fixed; bottom: 10px; left: 10px; right: 10px; 
            background: #fff; padding: 12px; border-radius: 12px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15); 
            z-index: 1000; display: flex; align-items: flex-end; gap: 10px;
        }
        #cart.hide { display: none; }
        
        .cart-right { flex-grow: 1; display: flex; flex-direction: column; align-items: flex-end; }
        #cart-list { 
            width: 100%; max-height: 80px; overflow-y: auto; font-size: 11px; 
            color: #444; border-bottom: 1px dashed #ddd; margin-bottom: 5px; text-align: right;
        }
        #total { font-size: 16px; font-weight: 900; color: var(--primary); margin-bottom: 5px; }
        #btn-wa { background: var(--wa); color: #fff; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-size: 14px; font-weight: bold; }
   /* CSS untuk Zoom */
#zoomModal {
    display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out;
}
#img-zoomed {
    max-width: 90%; max-height: 80%; border-radius: 10px;
    animation: zoomIn 0.2s ease;
}
@keyframes zoomIn { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }
   .card {
    /* Tambahkan ini ke dalam .card yang sudah ada */
    transition: opacity 0.3s ease;
} 
        /* Style untuk teks berjalan */
.promo-running {
    background: #fff3cd; /* Warna kuning soft */
    color: #856404;    /* Warna teks cokelat tua agar mudah dibaca */
    font-size: 13px;
    padding: 5px 0;
    font-weight: bold;
    border-bottom: 1px solid #ffeeba;
}
    </style>
</head>
<body>

<header><b>DUTA TERANG LED</b></header>
<header><b>DUTA TERANG LED</b></header>

<!-- Teks Berjalan -->
<div class="promo-running">
    <marquee behavior="scroll" direction="left" scrollamount="5">
        📢 PROMO MINGGU INI: kirim seluruh indonesia | Stok produk terbaru sudah tersedia | Melayani bayar COD.
    </marquee>
</div>
    
<div id="installModal">
    <div class="promo-box">
        <h3>Pasang Aplikasi?</h3>
        <p style="font-size: 13px;">Cek harga & stok jadi lebih mudah!</p>
        <button class="btn-main" onclick="triggerInstall()">PASANG</button>
        <button onclick="closePromo()" style="background:none; border:none; color:#999; font-size:12px;">Nanti Saja</button>
    </div>
</div>

<button id="installFloat" onclick="triggerInstall()">📲 INSTALL</button>

<div class="category" id="cat-bar">
    <button class="active" onclick="filter('all', this)">Semua</button>
</div>

<div class="container" id="list">Memuat...</div>

<div id="cart" class="hide">
    <div class="cart-left">
        <button onclick="resetCart()" style="background:var(--danger); border:none; padding:8px; border-radius:8px; color:#fff; cursor:pointer;">🗑️</button>
    </div>
    <div class="cart-right">
        <div id="cart-list"></div>
        <div id="total">Rp 0</div>
        <a id="btn-wa" href="#">KIRIM WA</a>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhgdk0elMuqM4-00OIR8zbUqp-k80RnbuYyPDDqGHsEk7aSCg60kgT5HTYL_hIVSDc/exec";
    let produk = [];
    let order = {};
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        setTimeout(() => { document.getElementById('installModal').style.display = 'flex'; }, 3000);
    });

    function closePromo() {
        document.getElementById('installModal').style.display = 'none';
        document.getElementById('installFloat').style.display = 'block';
    }

    async function triggerInstall() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt = null;
        }
    }

    async function load() {
    // 1. Cek apakah ada data produk lama di memori (Cache)
    const cachedProduk = localStorage.getItem("duta_terang_cache");
    if (cachedProduk) {
        produk = JSON.parse(cachedProduk);
        render(); // Langsung tampilkan produk lama dulu
        loadFromLocal(); // Muat jumlah keranjang
    }

    try {
        // 2. Ambil data terbaru dari Google Sheets di latar belakang
        const res = await fetch(API_URL);
        const dataTerbaru = await res.json();
        
        // 3. Jika data terbaru beda dengan cache, update tampilannya
        if (JSON.stringify(dataTerbaru) !== cachedProduk) {
            produk = dataTerbaru;
            localStorage.setItem("duta_terang_cache", JSON.stringify(produk));
            render();
            loadFromLocal();
        }
    } catch (e) {
        console.log("Gagal sinkronisasi data terbaru");
        if (!cachedProduk) {
            document.getElementById("list").innerText = "Gagal memuat. Periksa koneksi.";
        }
    }
}
    function rupiah(n) { return "Rp " + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

    function render() {
        let html = "";
        let kategori = new Set();
        produk.forEach(p => {
            if (!p.nama) return;
            kategori.add(p.kategori || "Lainnya");
            let disc = Number(p.diskon) || 0;
            let hrgFix = p.harga - (p.harga * disc / 100);
            
            html += `
            <div class="card" data-cat="${(p.kategori || 'Lainnya').toLowerCase()}">
                ${disc > 0 ? `<div style="position:absolute; top:5px; right:5px; background:var(--danger); color:white; font-size:9px; padding:1px 4px; border-radius:4px;">-${disc}%</div>` : ''}
                <img src="${p.gambar || 'https://via.placeholder.com/150'}" onclick="openZoom('${p.gambar || 'https://via.placeholder.com/150'}')">
                <div style="margin-top:6px; flex-grow:1;">
                    <b style="font-size:12px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; height:30px; line-height:1.2;">${p.nama}</b>
                    <div style="margin:4px 0;">
                        ${disc > 0 ? `<span class="price-old">${rupiah(p.harga)}</span>` : '<div style="height:15px"></div>'}
                        <span class="price-new">${rupiah(hrgFix)}</span>
                    </div>
                    <div class="qty">
                        <button onclick="changeQty('${p.id}', -1, ${hrgFix}, '${p.nama}')">-</button>
                        <span id="qty-${p.id}" style="font-size:13px">0</span>
                        <button onclick="changeQty('${p.id}', 1, ${hrgFix}, '${p.nama}')">+</button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
        
        let catHtml = '<button class="active" onclick="filter(\'all\', this)">Semua</button>';
        kategori.forEach(k => { catHtml += `<button onclick="filter('${k.toLowerCase()}', this)">${k}</button>`; });
        document.getElementById("cat-bar").innerHTML = catHtml;
    }

    function changeQty(id, delta, price, name) {
        if (!order[id]) order[id] = { qty: 0, name, price };
        order[id].qty += delta;
        if (order[id].qty < 0) order[id].qty = 0;
        document.getElementById(`qty-${id}`).innerText = order[id].qty;
        updateCart();
    }

    function updateCart() {
        let totalHarga = 0;
        let waText = "Halo Duta Terang, saya mau pesan:%0A%0A";
        let listHtml = "";
        let adaBarang = false;

        for (let id in order) {
            if (order[id].qty > 0) {
                adaBarang = true;
                totalHarga += (order[id].qty * order[id].price);
                listHtml += `<div style="margin-bottom:2px;">${order[id].name} (x${order[id].qty})</div>`;
                waText += `✅ ${order[id].name} (x${order[id].qty})%0A`;
            }
        }

        document.getElementById("cart-list").innerHTML = listHtml;
        document.getElementById("total").innerText = rupiah(totalHarga);
        document.getElementById("btn-wa").href = "https://wa.me/6288224166270?text=" + waText + "%0A*Total: " + rupiah(totalHarga) + "*";
        
        const cartEl = document.getElementById("cart");
        if (adaBarang) cartEl.classList.remove("hide");
        else cartEl.classList.add("hide");
        
        localStorage.setItem("duta_terang_cart", JSON.stringify({ order }));
    }

    function filter(cat, btn) {
        document.querySelectorAll(".card").forEach(c => {
            c.style.display = (cat === 'all' || c.dataset.cat === cat) ? 'flex' : 'none';
        });
        document.querySelectorAll(".category button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    }

    function resetCart() {
        if(confirm("Hapus pesanan?")) {
            order = {};
            localStorage.removeItem("duta_terang_cart");
            document.querySelectorAll("[id^='qty-']").forEach(el => el.innerText = "0");
            updateCart();
        }
    }

    function loadFromLocal() {
        const saved = localStorage.getItem("duta_terang_cart");
        if (saved) {
            order = JSON.parse(saved).order;
            updateCart();
            for (let id in order) {
                const el = document.getElementById(`qty-${id}`);
                if (el) el.innerText = order[id].qty;
            }
        }
    }

    load();

    // Fungsi untuk membuka zoom
function openZoom(imgUrl) {
    if(!imgUrl || imgUrl === 'undefined') return;
    document.getElementById("img-zoomed").src = imgUrl;
    document.getElementById("zoomModal").style.display = "flex";
    document.body.style.overflow = "hidden"; // Supaya layar utama tidak bisa discroll saat zoom
}
</script>
    <!-- Elemen untuk menampilkan gambar besar -->
<div id="zoomModal" onclick="this.style.display='none'; document.body.style.overflow='auto';">
    <img id="img-zoomed" src="">
</div>
</body>
</html>
