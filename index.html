<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Duta Terang LED</title>
    <style>
        :root { 
            --primary: #00bcd4; 
            --pink: #e91e63; 
            --wa: #25D366; 
            --danger: #ff4d4d;
        }
        body { margin: 0; font-family: sans-serif; background: #f5f6f8; padding-bottom: 140px; }
        header { background: var(--primary); color: #fff; text-align: center; padding: 12px; }
        .category { display: flex; gap: 8px; padding: 10px; background: #fff; position: sticky; top: 0; z-index: 100; overflow-x: auto; border-bottom: 1px solid #eee; }
        .category button { border: none; padding: 6px 15px; border-radius: 20px; background: #f0f0f0; cursor: pointer; white-space: nowrap; font-size: 12px; font-weight: bold; }
        .category button.active { background: var(--primary); color: #fff; }
        .container { padding: 8px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 800px; margin: auto; }
        .card { background: #fff; border-radius: 10px; padding: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 120px; object-fit: contain; background: #f9f9f9; border-radius: 8px; }
        .card-info { margin-top: 6px; flex-grow: 1; }
        .card-info b { font-size: 13px; color: #333; display: block; height: 32px; overflow: hidden; }
        
        /* HARGA SESUAI PERMINTAAN */
        .price-old { text-decoration: line-through; color: blue; font-size: 14px; font-weight: bold; display: block; }
        .price-new { color: var(--pink); font-weight: bold; font-size: 14px; display: block; }
        
        .qty { display: flex; justify-content: space-between; align-items: center; background: #f1f3f4; border-radius: 6px; padding: 2px; margin-top: 8px; }
        .qty button { width: 30px; height: 30px; border: none; background: var(--primary); color: #fff; border-radius: 4px; font-size: 18px; cursor: pointer; }
        #cart { position: fixed; bottom: 12px; left: 12px; right: 12px; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 -4px 20px rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        #cart.hide { display: none; }
        #btn-wa { background: var(--wa); color: #fff; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        .badge-diskon { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<header><b>DUTA TERANG LED</b></header>

<div class="category" id="cat-bar">
    <button class="active" onclick="filter('all', this)">Semua</button>
</div>

<div class="container" id="list">Memuat produk...</div>

<div id="cart" class="hide">
    <div id="total-area">
        <div style="font-size: 12px;">Total Pesanan:</div>
        <b id="total" style="font-size: 18px; color: var(--primary);">0</b>
    </div>
    <a id="btn-wa" href="#">Kirim WA</a>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhgdk0elMuqM4-00OIR8zbUqp-k80RnbuYyPDDqGHsEk7aSCg60kgT5HTYL_hIVSDc/exec";
    let produk = [];
    let order = {};
    let totalHarga = 0;

    async function load() {
        try {
            const res = await fetch(API_URL);
            produk = await res.json();
            render();
        } catch (e) { 
            document.getElementById("list").innerText = "Gagal memuat data."; 
        }
    }

    function rupiah(n) { return "Rp " + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

    function render() {
        let html = "";
        let kategori = new Set();
        produk.forEach(p => {
            if (!p.nama) return;
            kategori.add(p.kategori || "Lainnya");
            let diskon = Number(p.diskon) || 0;
            let hargaFix = p.harga - (p.harga * diskon / 100);
            
            html += `
            <div class="card" data-cat="${(p.kategori || 'Lainnya').toLowerCase()}">
                ${diskon > 0 ? `<div class="badge-diskon">-${diskon}%</div>` : ''}
                <img src="${p.gambar || 'https://via.placeholder.com/150'}">
                <div class="card-info">
                    <b>${p.nama}</b>
                    <div style="margin: 5px 0;">
                        ${diskon > 0 ? `<span class="price-old">${rupiah(p.harga)}</span>` : '<div style="height:16px"></div>'}
                        <span class="price-new">${rupiah(hargaFix)}</span>
                    </div>
                    <div class="qty">
                        <button onclick="changeQty('${p.id}', -1, ${hargaFix}, '${p.nama}')">-</button>
                        <span id="qty-${p.id}">0</span>
                        <button onclick="changeQty('${p.id}', 1, ${hargaFix}, '${p.nama}')">+</button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
        
        let catHtml = '<button class="active" onclick="filter(\'all\', this)">Semua</button>';
        kategori.forEach(k => {
            catHtml += `<button onclick="filter('${k.toLowerCase()}', this)">${k}</button>`;
        });
        document.getElementById("cat-bar").innerHTML = catHtml;
    }

    function changeQty(id, delta, price, name) {
        if (!order[id]) order[id] = { qty: 0, name, price };
        order[id].qty += delta;
        if (order[id].qty < 0) order[id].qty = 0;
        
        document.getElementById(`qty-${id}`).innerText = order[id].qty;
        updateCart();
    }

    function updateCart() {
        totalHarga = 0;
        let waText = "Halo Duta Terang, saya mau pesan:%0A";
        let adaBarang = false;

        for (let id in order) {
            if (order[id].qty > 0) {
                adaBarang = true;
                totalHarga += (order[id].qty * order[id].price);
                waText += `- ${order[id].name} (x${order[id].qty})%0A`;
            }
        }

        document.getElementById("total").innerText = rupiah(totalHarga);
        document.getElementById("btn-wa").href = "https://wa.me/6288224166270?text=" + waText + "%0A*Total: " + rupiah(totalHarga) + "*";
        
        if (adaBarang) document.getElementById("cart").classList.remove("hide");
        else document.getElementById("cart").classList.add("hide");
    }

    function filter(cat, btn) {
        document.querySelectorAll(".card").forEach(c => {
            c.style.display = (cat === 'all' || c.dataset.cat === cat) ? 'flex' : 'none';
        });
        document.querySelectorAll(".category button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    }

    load();
</script>
</body>
</html>
