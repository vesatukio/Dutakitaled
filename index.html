<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Duta Terang LED</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00bcd4">

    <style>
        :root { 
            --primary: #00bcd4; 
            --pink: #e91e63; 
            --wa: #25D366; 
            --danger: #ff4d4d;
        }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f5f6f8; padding-bottom: 180px; }
        
        /* Header */
        header { background: var(--primary); color: #fff; text-align: center; padding: 12px; }
        .running-wrap { overflow: hidden; white-space: nowrap; margin-top: 5px; background: rgba(0,0,0,0.1); padding: 4px 0; }
        .running-track { display: flex; width: max-content; animation: marquee 20s linear infinite; }
        .running-track span { padding-right: 50px; font-size: 11px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* Kategori Aktif Berwarna */
        .category { display: flex; gap: 8px; padding: 10px; background: #fff; position: sticky; top: 0; z-index: 100; overflow-x: auto; border-bottom: 1px solid #eee; }
        .category button { 
            border: 1px solid #ddd; padding: 8px 18px; border-radius: 20px; 
            background: #fff; color: #555; cursor: pointer; white-space: nowrap; 
            font-size: 12px; font-weight: bold;
        }
        .category button.active { 
            background: var(--primary) !important; color: #fff !important; border-color: var(--primary) !important;
        }

        /* Produk */
        .container { padding: 8px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 800px; margin: auto; }
        .card { background: #fff; border-radius: 10px; padding: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; }
        .card img { width: 100%; height: 120px; object-fit: contain; background: #f9f9f9; border-radius: 8px; }
        
        .price-old { text-decoration: line-through; color: blue; font-size: 14px; font-weight: bold; display: block; }
        .price-new { color: var(--pink); font-weight: bold; font-size: 14px; display: block; }

        /* Keranjang Modern dengan List Barang */
        #cart { 
            position: fixed; bottom: 12px; left: 12px; right: 12px; 
            background: #fff; padding: 15px; border-radius: 15px; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.2); 
            z-index: 1000; transition: 0.4s ease-in-out; 
        }
        #cart.hide { transform: translateY(120%); opacity: 0; }
        
        #cart-list { 
            max-height: 100px; overflow-y: auto; font-size: 12px; 
            color: #444; margin-bottom: 10px; border-bottom: 1px dashed #ddd; padding-bottom: 8px;
        }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 3px; }

        .cart-footer { display: flex; justify-content: space-between; align-items: center; }
        #total { font-size: 18px; font-weight: 900; color: var(--primary); }

        .qty button { width: 30px; height: 30px; border: none; background: var(--primary); color: #fff; border-radius: 4px; font-size: 18px; }

        /* Install Float */
        #installFloat {
            display: none; position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            background: var(--primary); color: white; border: none; padding: 12px 6px;
            border-radius: 10px 0 0 10px; font-size: 10px; font-weight: bold; z-index: 9999;
            writing-mode: vertical-rl;
        }
    </style>
</head>
<body>

<header><b>DUTA TERANG LED</b></header>

<button id="installFloat" onclick="triggerInstall()">📲 INSTALL APP</button>

<div class="category" id="cat-bar">
    <button class="active" onclick="filter('all', this)">Semua</button>
</div>

<div class="container" id="list">Memuat...</div>

<!-- Area Keranjang -->
<div id="cart" class="hide">
    <!-- List Barang di kanan atas tombol WA -->
    <div id="cart-list"></div>
    
    <div class="cart-footer">
        <button onclick="resetCart()" style="background:var(--danger); border:none; padding:10px; border-radius:8px; color:#fff; cursor:pointer;">🗑️</button>
        
        <div style="flex-grow: 1; margin-left: 15px;">
            <span style="font-size: 11px; color: #777;">Total:</span>
            <b id="total">Rp 0</b>
        </div>

        <a id="btn-wa" href="#" style="background:var(--wa); color:#fff; text-decoration:none; padding:12px 20px; border-radius:10px; font-weight:bold;">
            Kirim WA
        </a>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhgdk0elMuqM4-00OIR8zbUqp-k80RnbuYyPDDqGHsEk7aSCg60kgT5HTYL_hIVSDc/exec";
    let produk = [];
    let order = {};

    async function load() {
        try {
            const res = await fetch(API_URL);
            produk = await res.json();
            render();
            loadFromLocal();
        } catch (e) { document.getElementById("list").innerText = "Gagal memuat."; }
    }

    function rupiah(n) { return "Rp " + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

    function render() {
        let html = "";
        let kategori = new Set();
        produk.forEach(p => {
            if (!p.nama) return;
            kategori.add(p.kategori || "Lainnya");
            let disc = Number(p.diskon) || 0;
            let hrgFix = p.harga - (p.harga * disc / 100);
            
            html += `
            <div class="card" data-cat="${(p.kategori || 'Lainnya').toLowerCase()}">
                ${disc > 0 ? `<div style="position:absolute; top:5px; right:5px; background:var(--danger); color:white; font-size:10px; font-weight:bold; padding:2px 6px; border-radius:4px;">-${disc}%</div>` : ''}
                <img src="${p.gambar || 'https://via.placeholder.com/150'}">
                <div style="margin-top:6px; flex-grow:1;">
                    <b style="font-size:13px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; height:32px;">${p.nama}</b>
                    <div style="margin:5px 0;">
                        ${disc > 0 ? `<span class="price-old">${rupiah(p.harga)}</span>` : '<div style="height:19px"></div>'}
                        <span class="price-new">${rupiah(hrgFix)}</span>
                    </div>
                    <div class="qty">
                        <button onclick="changeQty('${p.id}', -1, ${hrgFix}, '${p.nama}')">-</button>
                        <span id="qty-${p.id}">0</span>
                        <button onclick="changeQty('${p.id}', 1, ${hrgFix}, '${p.nama}')">+</button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
        
        let catHtml = '<button class="active" onclick="filter(\'all\', this)">Semua</button>';
        kategori.forEach(k => { catHtml += `<button onclick="filter('${k.toLowerCase()}', this)">${k}</button>`; });
        document.getElementById("cat-bar").innerHTML = catHtml;
    }

    function changeQty(id, delta, price, name) {
        if (!order[id]) order[id] = { qty: 0, name, price };
        order[id].qty += delta;
        if (order[id].qty < 0) order[id].qty = 0;
        document.getElementById(`qty-${id}`).innerText = order[id].qty;
        updateCart();
    }

    function updateCart() {
        let totalHarga = 0;
        let waText = "Halo Duta Terang, saya pesan:%0A%0A";
        let listHtml = "";
        let adaBarang = false;

        for (let id in order) {
            if (order[id].qty > 0) {
                adaBarang = true;
                let subtotal = order[id].qty * order[id].price;
                totalHarga += subtotal;
                
                // Tambah ke list tampilan
                listHtml += `<div class="cart-item"><span>${order[id].name} (x${order[id].qty})</span><b>${rupiah(subtotal)}</b></div>`;
                
                // Tambah ke teks WA
                waText += `✅ ${order[id].name} (x${order[id].qty})%0A`;
            }
        }

        document.getElementById("cart-list").innerHTML = listHtml;
        document.getElementById("total").innerText = rupiah(totalHarga);
        document.getElementById("btn-wa").href = "https://wa.me/6288224166270?text=" + waText + "%0A*Total: " + rupiah(totalHarga) + "*";
        
        const cartEl = document.getElementById("cart");
        if (adaBarang) cartEl.classList.remove("hide");
        else cartEl.classList.add("hide");
        
        localStorage.setItem("duta_terang_cart", JSON.stringify({ order }));
    }

    function filter(cat, btn) {
        document.querySelectorAll(".card").forEach(c => {
            c.style.display = (cat === 'all' || c.dataset.cat === cat) ? 'flex' : 'none';
        });
        document.querySelectorAll(".category button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    }

    function resetCart() {
        if(confirm("Hapus pesanan?")) {
            order = {};
            localStorage.removeItem("duta_terang_cart");
            document.querySelectorAll("[id^='qty-']").forEach(el => el.innerText = "0");
            updateCart();
        }
    }

    function loadFromLocal() {
        const saved = localStorage.getItem("duta_terang_cart");
        if (saved) {
            order = JSON.parse(saved).order;
            updateCart();
            for (let id in order) {
                const el = document.getElementById(`qty-${id}`);
                if (el) el.innerText = order[id].qty;
            }
        }
    }

    // PWA Install Logic
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installFloat').style.display = 'block';
    });

    async function triggerInstall() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt = null;
        }
    }

    load();
</script>
</body>
</html>
